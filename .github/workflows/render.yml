name: Auto Render Motoroute Maps

# Se ejecuta cada vez que subes un archivo (push) a la rama principal (main o master)
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Copiar el código del repositorio en el servidor de GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Instalar Python en el servidor virtual
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instalar las librerías de tu requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Ejecutar tu script automáticamente para buscar GPX nuevos y generar la web
    - name: Run map generator
      run: python generar_mapa.py

    # 5. Guardar el nuevo mapa generado en la carpeta docs/ y publicarlo
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/
        # Solo hace push si realmente ha cambiado la web (si hay gpx nuevos)
        git diff-index --quiet HEAD || git commit -m "🤖 Web de rutas actualizada automáticamente"
        git push